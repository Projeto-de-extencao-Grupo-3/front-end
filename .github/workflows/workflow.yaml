name: CI/CD Workflow

on: pull_request

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 20.

      - name: Install dependencies 
        run: npm ci

      - name: Lint check
        run: npm run lint

      - name: Run Tests
        run: npm run test 

      - name: Build the project
        run: npm run build