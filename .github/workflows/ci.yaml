name: CI Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  continuos-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.
          cache: 'npm'

      - name: Install dependencies 
        run: npm ci

      - name: Lint check
        run: npm run lint

      - name: Run Tests
        run: npm run test 

      - name: Build the project
        run: npm run build