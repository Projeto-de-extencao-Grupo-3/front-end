name: Frontend - CD Deploy EC2

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]
  workflow_run:
    workflows: ["Frontend - CI Workflow"] 
    types:
      - completed
    branches:
      - main  

jobs:
  on-success:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            gabrielpacificooo/grotrack:${{ secrets.DOCKERHUB_IMAGE_TAG }}
            gabrielpacificooo/grotrack:latest
      
      -  name: Delay para garantir que a imagem esteja disponível no Docker Hub
         run: sleep 15

      - name: FE - Reiniciar aplicação no servidor (Usando SSH)
        run: |
          ssh -o StrictHostKeyChecking=no -i ${{ secrets.EC2_SSH_KEY }} ubuntu@${{ secrets.REMOTE_HOST_FRONT }}
          cd /home/gro-track/docker
          sudo bash -c 'docker compose -f frontend.yml down -v && docker compose -f frontend.yml pull && docker compose -f frontend.yml up -d'
      